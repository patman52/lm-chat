<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LM Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
</head>
<body>
    <main class="layout">
        <header class="page-header">
            <p class="eyebrow">LM Chat</p>
            <h1>Talk to your model</h1>
        </header>
        <!-- Chat container to the left -->
        <section id="chat-shell" class="chat-section">
            <div class="model-selection">
                <label for="model-select">Model</label>
                <select id="model-select" name="model">
                    {% for model in model_names %}
                        <option value="{{ model }}">{{ model }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="chat-container">
                <div class="chat-header">
                    <label for="chat-title-input">Chat Title</label>
                    <input type="text" id="chat-title-input" placeholder="Chat Title" aria-label="Chat Title">
                    <button id="new-chat-button">New Chat</button>
                </div>
                <div class="chat-messages" id="chat-messages" aria-live="polite">
                    <!-- chat messages will be appended here -->
                </div>
                <form class="chat-input" onsubmit="return false;">
                    <textarea id="chat-input" placeholder="Type your message here..." rows="6"></textarea>
                    <button id="send-button" type="submit">Send</button>
                </form>
            </div>
        </section>
        <!-- Sidebar to the right -->
        <section id="sidebar" class="sidebar">
            <h2>Saved Chats</h2>
            <!-- create a quick look up for saved chats that can be populated on page load and updated when new chats are created or existing chats are deleted -->
            <input type="text" id="search-chats-input" placeholder="Search chats..." aria-label="Search chats">
            <ul id="saved-chats-list">
            </ul>
        </section>
    </main>
<script src="{{ url_for('static', path='base.js') }}" defer></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</body>
</html>
