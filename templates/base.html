<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LM Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
</head>
<body>
    <main class="layout">
        <header class="page-header">
            <p class="eyebrow">LM Chat</p>
            <h1>Talk to your model</h1>
        </header>
        <!-- Chat container -->
        <section id="chat-shell" class="chat-section">
            <div class="chat-container">
                <div class="input-section">
                    <h2 class="input-section-title">Input Section</h2>
                    <div class="model-selection">
                        <label for="model-select">Model</label>
                        <select id="model-select" name="model">
                            {% for model in model_names %}
                                <option value="{{ model }}">{{ model }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <form class="chat-input" onsubmit="return false;">
                        <textarea id="chat-input" placeholder="Type your message here..." rows="6"></textarea>

                        <div class="upload-box" id="file-drop-zone">
                            <div class="upload-icon">📊</div>
                            <p>Drag and drop files here to upload</p>
                        </div>

                        <button id="new-chat-button" type="button">New Chat</button>
                        <!-- popup for chat title -->
                        <div class="modal-box" id="chat-title-modal" style="display: none;">
                            <h2>Enter Chat Title</h2>
                            <input type="text" id="chat-title-input" placeholder="Chat Title">
                            <div class="modal-actions">
                                <button type="button" class="btn-cancel" id="cancel-chat-title">Cancel</button>
                                <button type="button" class="btn-save" id="save-chat-title">Save</button>
                            </div>
                        </div>

                        <button id="send-button" type="submit">Send</button>
                        <button id="export-chat" type="button">Export Chat</button>
                        <button id="delete-chat-button" type="button">Delete Chat</button>
                    </form>
                </div>

                <!-- Right side Chat messages -->
            <div class="chat-history-panel">
                <h2 class="chat-history-title">Chat History</h2>
                <div class="chat-messages" id="chat-messages" aria-live="polite"></div>
            </div>
            </div>
        </section>
        <!-- Sidebar to the right -->
        <section id="sidebar" class="sidebar">
            <h2>Saved Chats</h2>
            <!-- create a quick look up for saved chats that can be populated on page load and updated when new chats are created or existing chats are deleted -->
            <input type="text" id="search-chats-input" placeholder="Search chats..." aria-label="Search chats">
            <ul id="saved-chats-list">
            </ul>
        </section>
    </main>
<script src="{{ url_for('static', path='base.js') }}" defer></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</body>
</html>
